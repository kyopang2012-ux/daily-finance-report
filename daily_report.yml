name: Daily Financial News Report

# Trigger the workflow automatically at 9:00 AM HKT (01:00 AM UTC) every day
# And allow manual trigger via workflow_dispatch
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

# Ensure GITHUB_TOKEN has permissions to push to the repo
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Fund Manager AI (manager_agent.py)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python manager_agent.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "Automated Daily Report Update" || echo "No changes to commit"
          git push
